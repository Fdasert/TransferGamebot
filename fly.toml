# fly.toml app configuration file generated for transfer-gamebot on 2026-05-20T22:42:03+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'transfer-gamebot'
primary_region = 'ams'
auto_stop_machines = false
min_machines_running = 1
[build]

[env]
  PYTHONUNBUFFERED = '1'

# No [http_service] — bot uses polling, no HTTP port needed
# auto_stop_machines must stay false for polling bots (they don't accept HTTP traffic)

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
